<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类一败涂地 3D Web版 (高度还原修复版)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #dbe4eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
            line-height: 1.6;
        }
        h1 { margin: 0 0 8px 0; font-size: 18px; color: #2d3748; }
        p { margin: 4px 0; font-size: 13px; color: #4a5568; }
        span { color: #3182ce; font-weight: bold; }
        #loader {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #dbe4eb; display: flex; justify-content: center;
            align-items: center; z-index: 999; font-size: 24px; color: #4a5568;
            transition: opacity 0.5s;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loader">正在加载 3D 物理世界...</div>

    <div id="ui">
        <h1>人类一败涂地 - Web Simulator</h1>
        <p>🕹️ <b>移动：</b><span>W A S D</span>（随视角自动转向）</p>
        <p>👀 <b>视角：</b><span>按住鼠标左键并拖拽</span> 360°旋转镜头</p>
        <p>🖐️ <b>灵魂动作：</b><span>按住鼠标右键 / 键盘 E 键</span> 高举双手</p>
        <p>🦘 <b>跳跃：</b><span>空格键 (SPACE)</span> 魔性起跳</p>
    </div>

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 隐藏加载提示
        document.getElementById('loader').style.opacity = 0;
        setTimeout(() => document.getElementById('loader').remove(), 500);
