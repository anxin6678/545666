<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类一败涂地 3D Web完美修复版</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #dbe4eb;
            font-family: 'Segoe UI', system-ui, sans-serif; user-select: none;
        }
        /* 炫酷的动态加载遮罩 */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #dbe4eb; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #cbd5e1;
            border-top-color: #3182ce; border-radius: 50%; animation: spin 1s linear infinite;
        }
        #loader-text { margin-top: 20px; color: #4a5568; font-size: 16px; font-weight: bold; text-align: center; line-height: 1.6; }
        
        /* 操控指南UI */
        #ui {
            position: absolute; top: 20px; left: 20px; color: #333;
            background: rgba(255, 255, 255, 0.92); padding: 15px 25px;
            border-radius: 12px; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.5);
            z-index: 100; display: none;
        }
        #error-screen {
            position: fixed; bottom: 20px; left: 20px; color: #ff3b30;
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 8px;
            font-family: monospace; font-size: 14px; max-width: 90%;
            z-index: 99999; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h1 { margin: 0 0 8px 0; font-size: 18px; color: #1a202c; }
        p { margin: 4px 0; font-size: 13px; color: #4a5568; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loader-text">安全自愈内核正在校验网络环境...</div>
    </div>

    <div id="ui">
        <h1>人类一败涂地 (Web 3D 修复版)</h1>
        <p>🕹️ <b>走动：</b>W、A、S、D (方向自动跟随鼠标视角)</p>
        <p>👀 <b>视角：</b>按住【鼠标左键】在屏幕上拖拽调整视野</p>
        <p>🦘 <b>跳跃：</b>Space (空格键)</p>
    </div>

    <div id="error-screen"></div>

    <script>
        const statusText = document.getElementById('loader-text');
        const errorScreen = document.getElementById('error-screen');

        function triggerFatalError(msg) {
            errorScreen.style.display = 'block';
            errorScreen.innerHTML = `🚨 运行时发生致命卡死：<br>${msg}`;
        }

        // 全时段全局错误监听
        window.onerror = function(message, source, lineno, colno, error) {
            triggerFatalError(`${message} (第 ${lineno} 行)`);
            return false;
        };

        // 筛选出的国内及国际最强硬的 CDN 节点库
        const THREE_LINKS = [
            "https://lib.baomitu.com/three.js/r128/three.min.js",
            "https://cdn.staticfile.org/three.js/r128/three.min.js",
            "https://fastly.jsdelivr.net/npm/three@0.128.0/build/three.min.js"
        ];
        const CANNON_LINKS = [
            "https://lib.baomitu.com/cannon.js/0.0.8/cannon.min.js",
            "https://cdn.staticfile.org/cannon.js/0.0.8/cannon.min.js",
            "https://fastly.jsdelivr.net/npm/cannon@0.0.8/build/cannon.min.js"
        ];

        // 【核心修复】：带实体防死锁校验的动态脚本加载器
        function smartLoad(urls, globalVarName, index, onAllSuccess, onAllFail) {
            if (index >= urls.length) {
                onAllFail();
                return;
            }

            const script = document.createElement('script');
            script.src = urls[index];
            
            script.onload = () => {
                // 核心防诈骗校验：不仅要下载成功，还要确保 window 上真的被注入了该对象
                if (window[globalVarName] !== undefined) {
                    console.log(`[成功] 引擎 ${globalVarName} 已通过防死锁验证！`);
                    onAllSuccess();
                } else {
                    console.warn(`[拦截] 节点 ${index} 返回了假文件，正在启动自愈切换...`);
                    script.remove();
                    smartLoad(urls, globalVarName, index + 1, onAllSuccess, onAllFail);
                }
            };

            script.onerror = () => {
                script.remove();
                smartLoad(urls, globalVarName, index + 1, onAllSuccess, onAllFail);
            };

            document.head.appendChild(script);
        }

        // 串行安全激活双引擎
        statusText.innerText = "正在激活 3D 图形内核 (线路校验中)...";
        smartLoad(THREE_LINKS, 'THREE', 0, () => {
            statusText.innerText = "3D 图形内核校验成功！\n正在注入物理解密沙盒...";
            smartLoad(CANNON_LINKS, 'CANNON', 0, () => {
                statusText.innerText = "双引擎强力注入成功！面条人正在降落...";
                // 留出时间给浏览器渲染主帧，防止闪屏
                setTimeout(startPhysicsWorld, 300);
            }, () => triggerFatalError("物理引擎全部 CDN 校验失败，请检查网络拦截设置。"));
        }, () => triggerFatalError("3D图形内核全部 CDN 校验失败，请更换浏览器重试。"));

        // --- 核心安全游戏世界（确保内部绝不包含任何未定义变量） ---
        function startPhysicsWorld() {
            // 双重保险检测
            if (typeof THREE === 'undefined' || typeof CANNON === 'undefined') {
                triggerFatalError("核心依赖库未被正确识别，初始化被强制终止！");
                return;
            }

            // 关闭加载遮罩
            document.getElementById('loader').style.display = 'none';
            document.getElementById('ui').style.display = 'block';

            // 1. 场景配置
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xdbe4eb);
            scene.fog = new THREE.FogExp2(0xdbe4eb, 0.015);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.BasicShadowMap;
            
            renderer.domElement.style.position = 'absolute';
            renderer.domElement.style.top = '0';
            renderer.domElement.style.left = '0';
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            renderer.domElement.style.zIndex = '1';
            document.body.appendChild(renderer.domElement);

            // 光源
            scene.add(new THREE.AmbientLight(0xffffff, 0.75));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
            dirLight.position.set(25, 45, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 2. 物理刚体沙盒实例化
            const world = new CANNON.World();
            world.gravity.set(0, -16, 0);
            const baseMaterial = new CANNON.Material("base");
            world.addContactMaterial(new CANNON.ContactMaterial(baseMaterial, baseMaterial, { friction: 0.3, restitution: 0.1 }));

            // 物理与视觉平面
            const groundBody = new CANNON.Body({ mass: 0, material: baseMaterial });
            groundBody.addShape(new CANNON.Plane());
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0xb0c4de, roughness: 0.9 }));
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);
