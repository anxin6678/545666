<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类一败涂地 3D Web版 (高度还原)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #dbe4eb;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            pointer-events: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.4);
        }
        h1 { margin: 0 0 8px 0; font-size: 18px; color: #4a5568; }
        p { margin: 4px 0; font-size: 13px; color: #718096; }
        #canvas-container { width: 100vw; height: 100vh; }
    </style>
    <!-- 引入稳定版 Three.js 和 Cannon.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.0.8/cannon.min.js"></script>
</head>
<body>

    <div id="ui">
        <h1>人类一败涂地 (Human Web Simulator)</h1>
        <p>🕹️ <b>移动：</b>W A S D (基于相机视角)</p>
        <p>👀 <b>视角：</b>点击画面并拖拽鼠标 360° 旋转</p>
        <p>🖐️ <b>灵魂抓取：</b>按住【鼠标左键】举起双手</p>
        <p>🦘 <b>跳跃：</b>【空格键】快乐起跳</p>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. 基础场景与物理引擎初始化 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdbe4eb); // 还原游戏标志性灰蓝色天空
        scene.fog = new THREE.FogExp2(0xdbe4eb, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // 柔和的低模光影
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(30, 50, 20);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 150;
